name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pc-linux:
    name: PC app (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S pc -B pc/build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build pc/build --parallel
      - name: Test
        run: ctest --test-dir pc/build --output-on-failure

  pc-linux-sdl:
    name: PC app (Linux, SDL display)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SDL2
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev
      - name: Configure
        run: >
          cmake -S pc -B pc/build -DCMAKE_BUILD_TYPE=Release
          -DWSU_WITH_SDL=ON
      - name: Build
        run: cmake --build pc/build --parallel
      - name: Test (headless SDL via dummy drivers)
        run: ctest --test-dir pc/build --output-on-failure
      - name: Upload Linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: wsu-linux-x64
          path: |
            pc/build/wsu
            pc/build/wsu-app

  pc-windows-package:
    name: PC app (Windows, SDL) + download package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SDL2 (vcpkg)
        run: vcpkg install sdl2:x64-windows
      - name: Configure
        # The -D argument must be quoted so PowerShell expands $env: inside
        # it (bare -D... tokens are passed literally).
        run: >
          cmake -S pc -B pc/build -DWSU_WITH_SDL=ON
          "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
      - name: Build
        run: cmake --build pc/build --config Release --parallel
      - name: Test (headless SDL via dummy drivers)
        run: ctest --test-dir pc/build -C Release --output-on-failure
      - name: Stage package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package | Out-Null
          Copy-Item pc/build/Release/wsu-app.exe package/
          Copy-Item pc/build/Release/wsu.exe package/
          Copy-Item pc/build/Release/*.dll package/
          @"
          Wii-Sec-U PC app (Windows x64)

          wsu-app.exe  — double-click this. Graphical app: host your Wii U
                         or join a friend, video + audio in the window.
          wsu.exe      — command-line version for scripting/headless use
                         (run from a terminal: wsu.exe --help).

          Keep the .dll files next to the .exe files.
          "@ | Set-Content package/README.txt
      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: wsu-windows-x64
          path: package/

  pc-windows:
    name: PC app (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S pc -B pc/build
      - name: Build
        run: cmake --build pc/build --config Release --parallel
      - name: Test
        run: ctest --test-dir pc/build -C Release --output-on-failure

  wiiu-plugins:
    name: Wii U plugins (Aroma)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build plugin build image
        uses: docker/build-push-action@v6
        env:
          # Don't upload the build-summary (.dockerbuild) artifact; it isn't
          # a deliverable and its download flakes in the publish job.
          DOCKER_BUILD_SUMMARY: "false"
        with:
          context: .
          file: wiiu/Dockerfile
          tags: wsu-wiiu-builder
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build wsu-input
        run: >
          docker run --rm -v "$PWD":/project wsu-wiiu-builder
          make -C wiiu/input-plugin -j"$(nproc)"
      - name: Build wsu-stream
        run: >
          docker run --rm -v "$PWD":/project wsu-wiiu-builder
          make -C wiiu/stream-plugin -j"$(nproc)"
      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wiiu-plugins
          path: |
            wiiu/input-plugin/wsu-input.wps
            wiiu/stream-plugin/wsu-stream.wps

  # Every green build of main updates the rolling "latest" release on the
  # repo's Releases page, so downloads are one click from the front page.
  publish-latest:
    name: Publish downloads (Releases page)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [pc-linux-sdl, pc-windows-package, wiiu-plugins]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      # Download only the artifacts we ship. Downloading *all* artifacts
      # also pulls the auto-generated docker build-summary blob, whose
      # download intermittently fails and would fail this whole job.
      - uses: actions/download-artifact@v4
        with:
          pattern: "{wsu-windows-x64,wsu-linux-x64,wiiu-plugins}"
          path: artifacts
      - name: Package downloads
        run: |
          cd artifacts
          (cd wsu-windows-x64 && zip -r ../wsu-windows-x64.zip .)
          chmod +x wsu-linux-x64/wsu wsu-linux-x64/wsu-app || true
          tar -C wsu-linux-x64 -czf wsu-linux-x64.tar.gz .
          (cd wiiu-plugins && zip -r ../wiiu-plugins.zip .)
      - name: Update "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest \
            --title "Wii-Sec-U — latest build" \
            --notes "Automated build of \`main\` @ ${GITHUB_SHA::7}.

          - **wsu-windows-x64.zip** — unzip, double-click \`wsu-app.exe\` (graphical app; \`wsu.exe\` is the command-line version)
          - **wsu-linux-x64.tar.gz** — needs \`libsdl2-2.0-0\`; run \`./wsu-app\`
          - **wiiu-plugins.zip** — copy both \`.wps\` files to \`sd:/wiiu/environments/aroma/plugins/\` (Aroma required); configure in-game via the plugin config menu (L + D-Pad Down + SELECT)" \
            wsu-windows-x64.zip wsu-linux-x64.tar.gz wiiu-plugins.zip
        working-directory: artifacts
