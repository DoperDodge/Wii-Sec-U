name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pc-linux:
    name: PC app (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S pc -B pc/build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build pc/build --parallel
      - name: Test
        run: ctest --test-dir pc/build --output-on-failure

  pc-linux-sdl:
    name: PC app (Linux, SDL display)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SDL2
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev
      - name: Configure
        run: >
          cmake -S pc -B pc/build -DCMAKE_BUILD_TYPE=Release
          -DWSU_WITH_SDL=ON
      - name: Build
        run: cmake --build pc/build --parallel
      - name: Test (headless SDL via dummy drivers)
        run: ctest --test-dir pc/build --output-on-failure
      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: wsu-linux-x64
          path: pc/build/wsu

  pc-windows-package:
    name: PC app (Windows, SDL) + download package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SDL2 (vcpkg)
        run: vcpkg install sdl2:x64-windows
      - name: Configure
        # The -D argument must be quoted so PowerShell expands $env: inside
        # it (bare -D... tokens are passed literally).
        run: >
          cmake -S pc -B pc/build -DWSU_WITH_SDL=ON
          "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
      - name: Build
        run: cmake --build pc/build --config Release --parallel
      - name: Test (headless SDL via dummy drivers)
        run: ctest --test-dir pc/build -C Release --output-on-failure
      - name: Stage package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package | Out-Null
          Copy-Item pc/build/Release/wsu.exe package/
          Copy-Item pc/build/Release/*.dll package/
          @"
          Wii-Sec-U PC app (Windows x64), built with SDL2.

          This is a command-line program; run it from a terminal:
            wsu.exe client --host <host-ip> --name yourname --input sdl
            wsu.exe host --console <wiiu-ip> --input sdl
            wsu.exe --help

          Keep SDL2.dll next to wsu.exe.
          "@ | Set-Content package/README.txt
      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: wsu-windows-x64
          path: package/

  pc-windows:
    name: PC app (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S pc -B pc/build
      - name: Build
        run: cmake --build pc/build --config Release --parallel
      - name: Test
        run: ctest --test-dir pc/build -C Release --output-on-failure

  wiiu-plugins:
    name: Wii U plugins (Aroma)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build plugin build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: wiiu/Dockerfile
          tags: wsu-wiiu-builder
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build wsu-input
        run: >
          docker run --rm -v "$PWD":/project wsu-wiiu-builder
          make -C wiiu/input-plugin -j"$(nproc)"
      - name: Build wsu-stream
        run: >
          docker run --rm -v "$PWD":/project wsu-wiiu-builder
          make -C wiiu/stream-plugin -j"$(nproc)"
      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wiiu-plugins
          path: |
            wiiu/input-plugin/wsu-input.wps
            wiiu/stream-plugin/wsu-stream.wps
